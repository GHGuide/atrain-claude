name: smart-router tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run hook self-tests
        run: python3 .claude/hooks/router.py --test
      - name: Lint SKILL.md against classify_task constants
        run: python3 .claude/hooks/router.py --lint-skill
      - name: Run classifier eval corpus (must be 100%)
        run: |
          out=$(python3 tools/evals/run_eval.py)
          echo "$out"
          echo "$out" | grep -q "GRAND TOTAL: 108/108" || exit 1
      - name: Smoke-test PreToolUse via stdin
        run: |
          echo '{"hook_event":"PreToolUse","tool_name":"Read","tool_input":{"path":"src/index.ts"},"session_id":"ci"}' \
            | python3 .claude/hooks/router.py | grep -q "haiku"
      - name: Smoke-test sensitive escalation
        run: |
          echo '{"hook_event":"PreToolUse","tool_name":"Write","tool_input":{"path":"src/auth/login.ts","content":"x"},"session_id":"ci"}' \
            | python3 .claude/hooks/router.py | grep -q "opus"
      - name: Smoke-test SessionEnd
        run: |
          echo '{"hook_event":"SessionEnd","session_id":"ci"}' \
            | python3 .claude/hooks/router.py | grep -q "calibration complete"
      - name: Run benchmark
        run: python3 bench.py
